services:
  - type: web
    name: whiteboard-app
    runtime: node
    plan: free
    branch: main
    # --include=dev forces devDependencies (vite, tailwind plugin) to install
    # even though NODE_ENV=production, which otherwise skips them and 127s.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        value: https://whiteboard-app-8loo.onrender.com
      - key: CLIENT_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_VISION_KEY
        sync: false
