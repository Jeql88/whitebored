services:
  - type: web
    name: whiteboard-app
    runtime: node
    plan: free
    branch: main
    # --include=dev forces devDependencies (vite, tailwind plugin) to install
    # even though NODE_ENV=production, which otherwise skips them and 127s.
    buildCommand: npm install --include=dev && cd client && npm install && npx vite build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_VISION_KEY
        sync: false
